# Handles mapping of Upgrade header for WebSocket stability
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;
    # Redirects all HTTP traffic to HTTPS on the custom cluster port
    return 301 https://$host:8443$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate /etc/nginx/ssl/transcendence.crt;
    ssl_certificate_key /etc/nginx/ssl/transcendence.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://app:3000; # Routes to 'app' service name in docker-compose
        proxy_http_version 1.1;

        # Use $http_host to include port 8443; prevents Next.js Server Action Origin mismatch
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;

        # WebSocket support for game and chat
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Prevents Nginx from killing idle WebSocket connections every 60s
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
