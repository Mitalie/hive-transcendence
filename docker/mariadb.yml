# standalone MariaDB fragment matching the main docker-compose configuration
services:
  mariadb:
    # Pin to LTS (11.4.x) to ensure compatibility with Prisma's authentication driver
    image: mariadb:lts

    # Added command to reduce log noise from aborted Prisma sync connections
    command: ["mariadbd", "--log-warnings=1"]

    environment:
      - MARIADB_ROOT_PASSWORD
      - MARIADB_DATABASE
      - MARIADB_USER
      - MARIADB_PASSWORD

    volumes:
      # Persistent volume for MariaDB data
      - transcendence_mariadb_data:/var/lib/mysql
