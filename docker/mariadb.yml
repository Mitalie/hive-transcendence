# reusable MariaDB fragment to share the configuration with multiple compose setups
services:
  mariadb:
    # Pin to LTS (11.4.x) to ensure compatibility with Prisma's authentication driver
    image: mariadb:lts

    # Added command to reduce log noise from aborted Prisma sync connections
    command: ["mariadbd", "--log-warnings=1"]

    environment:
      - MARIADB_ROOT_PASSWORD
      - MARIADB_DATABASE
      - MARIADB_USER
      - MARIADB_PASSWORD

    volumes:
      # Persistent volume for MariaDB data
      - transcendence_mariadb_data:/var/lib/mysql

    healthcheck:
      # Using 127.0.0.1 instead of localhost forces a TCP check,
      # ensuring Docker waits for the REAL server, not the temp socket server.
      test: mariadb-admin ping -h 127.0.0.1 -u root -p$$MARIADB_ROOT_PASSWORD
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
